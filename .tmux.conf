# vi window movements
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Ctrl-Space Leader
unbind C-b
set -g prefix 'C-Space'
bind 'C-Space' send-prefix

# Shorthand to sync panes
set -s command-alias[100] 'sync=setw synchronize-panes on'
set -s command-alias[101] 'unsync=setw synchronize-panes off'

# Default fish shell
set -g default-shell "/usr/bin/env fish"
