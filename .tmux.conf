# vi window movements
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Ctrl-Space Leader
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Shorthand to sync panes
set -s command-alias[100] 'sync=setw synchronize-panes on'
set -s command-alias[101] 'unsync=setw synchronize-panes off'

# Keybind to sync panes
bind-key S if-shell '[ "#{pane_synchronized}" = "1" ]' \
  'setw synchronize-panes off; display "Sync OFF"' \
  'setw synchronize-panes on;  display "Sync ON"'

set -g default-command fish
